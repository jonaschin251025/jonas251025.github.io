<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2: Positivus</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            box-sizing: border-box;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-weight: 400;
            cursor: pointer;
        }

        .quote-btn {
            background-color: #ffffff;
            border: 1px solid #000000;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: #000000;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .quote-btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 5%;
            gap: 40px;
            box-sizing: border-box;
        }

        .intro-text {
            flex: 1;
            max-width: 500px;
        }

        .intro-text h1 {
            font-size: 52px;
            line-height: 1.2;
            font-weight: 800;
            margin: 0 0 20px 0;
        }

        .intro-text p {
            font-size: 18px;
            color: #555555;
            line-height: 1.6;
            margin: 0 0 30px 0;
        }

        .consult-btn {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 18px 32px;
            border-radius: 14px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .hero-illustration {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .hero-illustration img {
            width: 100%;
            max-width: 500px;
            height: auto;
        }

        .logos-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 40px 5%;
            gap: 20px;
        }

        .logos-container img {
            max-height: 35px;
            width: auto;
            max-width: 130px;
            object-fit: contain;
        }

        @media screen and (max-width: 1024px) {
            .nav-links {
                display: none;
            }

            .hero-section {
                flex-direction: column-reverse;
                text-align: left;
            }

            .intro-text {
                max-width: 100%;
            }

            .hero-illustration {
                justify-content: center;
            }

            .intro-text h1 {
                font-size: 40px;
            }
        }

        @media screen and (max-width: 600px) {
            .logos-container {
                justify-content: space-around;
            }

            .logos-container img {
                flex: 0 0 40%;
                max-height: 30px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="images/PositivusLogo.png" alt="Logo">
        </div>
        <nav class="nav-links">
            <a>About us</a>
            <a>Services</a>
            <a>Use Cases</a>
            <a>Pricing</a>
            <a>Blog</a>
            <button class="quote-btn">Request a quote</button>
        </nav>
    </header>

    <main class="hero-section">
        <div class="intro-text">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including SEO, PPC, social media marketing, and content creation.</p>
            <button class="consult-btn">Book a free consultation</button>
        </div>
        <div class="hero-illustration">
            <img src="images/Illustration.png" alt="Illustration">
        </div>
    </main>

    <section class="logos-container">
        <img src="images/amazon.png" alt="Amazon Logo">
        <img src="images/dribble.png" alt="Dribble Logo">
        <img src="images/HubSpot.png" alt="HubSpot Logo">
        <img src="images/Notion.png" alt="Notion Logo">
        <img src="images/Netflix.png" alt="Netflix Logo">
        <img src="images/zoom.png" alt="Zoom Logo">
    </section>

</body>

</html>
