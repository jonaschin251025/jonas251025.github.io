<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <img src="images/PositivusLogo.png" alt="Logo" style="height: 40px;">
        </div>

        <div>
            <a>About us</a>
            <a>Services</a>
            <a>Use Cases</a>
            <a>Pricing</a>
            <a>Blog</a>
            <button>Request a quote</button>
        </div>
    </header>
    <div>
        <p>Navigating the digital landscape for success</p>
        <p>Our digital marketing agency helps businesses grow and succeed online through a range of services including
            SEO, PPC, social media marketing, and content creation.</p>

        <button>Book a consultation</button>
    </div>
</body>

</html>
