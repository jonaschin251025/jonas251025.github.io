<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        h1 {
            font-size: 40px;
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        button.quote-btn {
            background-color: #ffffff;
            color: #6c757d;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: 1px solid #6c757d;
            border-radius: 15px;
        }

        button.consult-btn {
            background-color: #000000;
            color: #ffffff;
            font-size: 16px;
            padding: 16px 32px;
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <img src="images/PositivusLogo.png" alt="Logo" style="height: 40px;">
        </div>

        <div style="display: flex; align-items: center; gap: 30px;">
            <a>About us</a>
            <a>Services</a>
            <a>Use Cases</a>
            <a>Pricing</a>
            <a>Blog</a>
            <button class="quote-btn">Request a quote</button>
        </div>
    </header>

    <div style="display: flex; align-items: center; gap: 40px; margin-top: 40px; margin-bottom: 60px;">
    </div>


    <div style="display: flex;">
        <div>
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including SEO, PPC, social media marketing, and content creation.</p>
            <button class="consult-btn">Book a free consultation</button>
        </div>

        <div>
            <img src="images/Illustration.png" alt="Illustration">
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <img src="images/amazon.png" alt="Amazon Logo">
        <img src="images/dribble.png" alt="Dribble Logo">
        <img src="images/hubspot.png" alt="HubSpot Logo">
        <img src="images/notion.png" alt="Notion Logo">
        <img src="images/netflix.png" alt="Netflix Logo">
        <img src="images/zoom.png" alt="Zoom Logo">
    </div>

</body>

</html>
