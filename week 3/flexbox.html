<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox1</title>
</head>

<style>
    body {
        background-color: #F6F5EF;
        font-family: Arial, Helvetica, sans-serif;
    }

    .container {
        display: flex;
        max-width: 1024px;
        margin: auto;
        gap: 20px;
        padding: 20px;
    }

    .a {
        flex: 1;
        background-color: #ffffff;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
    }

    .b {
        flex: 1;
        background-color: #ffffff;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
    }

    .c {
        flex: 1;
        background-color: #ffffff;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
    }

    .a img {
        width: 100%;
        height: auto;
        border-radius: 8px;
    }

    .b img {
        width: 100%;
        height: auto;
        border-radius: 8px;
    }

    .c img {
        width: 100%;
        height: auto;
        border-radius: 8px;
    }

    h2 {
        margin: 8px;
    }

    p {
        color: #8b8b8b;
        margin: 0;
    }
</style>

<body>
    <div class="container">
        <div class="a">
            <img src="images/custom-img-017-copyright.jpg" alt="Residential projects">
            <h2>Residential projects</h2>
            <p>We build sustainable and modern homes for comfortable living.</p>
        </div>
        <div class="b">
            <img src="images/custom-img-018-copyright.jpg" alt="Commercial projects">
            <h2>Commercial spaces</h2>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
        </div>
        <div class="c">
            <img src="images/custom-img-019-copyright.jpg" alt="Infrastructure works">
            <h2>Infrastructure works</h2>
            <p>We develop strong, reliable infrastructure for growing communities.</p>
        </div>
    </div>
</body>
