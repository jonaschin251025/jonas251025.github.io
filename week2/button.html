<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise1-Button</title>
    <style>
        button.request {
            background-color: #000000;
            color: #ffffff;
            font-size: 16px;
            border: none;
            padding: 12px 24px;
        }

        button.signup {
            background-color: #54a259;
            color: #ffffff;
            font-size: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
        }

        button.cart {
            background-color: #f9da4e;
            color: #000000;
            font-size: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
        }

        button.started {
            background-color: #7353ad;
            color: #ffffff;
            font-size: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
        }

        button.download {
            background-color: #ffffff;
            color: #787c81;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: 1.4px solid #787c81;
            border-radius: 6px;
        }

        button.apply {
            background-color: #2463c3;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 24px;
        }

        button.save {
            background-color: #ffffff;
            color: #2463c3;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: 2px solid #2463c3;
            border-radius: 24px;
        }
    </style>
</head>

<body>
    <button class="request">Request now</button>
    <button class="signup">Sign up</button>
    <button class="cart">Add to Cart</button>
    <br><br>
    <button class="started">Get started</button>
    <button class="download">Download</button>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
</body>

</html>
