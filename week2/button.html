<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise1-Button</title>
    <style>
        button.request {
            background-color: #000000;
            color: #ffffff;
            font-size: 16px;
            border: none;
            padding: 12px 24px;
        }

        button.signup {
            background-color: #54a259;
            color: #ffffff;
            font-size: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
        }

        button.cart {
            background-color: #f9da4e;
            color: #000000;
            font-size: 16px;
            padding: 12px 24px;
            border: none;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <button class="request">Request now</button>
    <button class="signup">Sign up</button>
    <button class="cart">Add to Cart</button>
</body>

</html>
