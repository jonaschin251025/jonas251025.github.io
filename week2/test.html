<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            color: crimson;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            text-decoration: underline;
            font-size: 60px;
            background-color: rgb(255, 255, 0);
        }

        h1.nounderline {
            background-color: rgb(120, 114, 195);
            text-decoration: none;
            text-align: right;
            font-size: 50px;
        }

        p {
            color: blue;
            background-color: rgb(141, 247, 171);
            border: 2px solid black;
            border-radius: 10px;
            padding: 10px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            text-align: right;
            font-size: 20px;
        }

        img {
            display: block;
            /* Make the image to non sharing spacing*/
            margin: 0 auto;
            /*Center the image horizontally*/
        }

        body {
            background-color: rgb(252, 255, 212);
        }
    </style>
</head>

<body>
    <h1> bro </h1>
    <h1 class="nounderline"> bro </h1>
    <p> no cap on god bro </p>
    <img src="Instagram_icon.png" width="30" alt="Instagram Logo">

</body>

</html>
